# =============================================================================
# TheHive 5 — Application Configuration
# Docs: https://docs.strangebee.com/thehive/installation/docker/
#
# THEHIVE_SECRET env var is injected by docker-compose from .env
# =============================================================================

# Play Framework secret key (must match THEHIVE_SECRET in .env)
play.http.secret.key = ${?THEHIVE_SECRET}

# ── Database — Cassandra 4 ───────────────────────────────────────────────────
db.janusgraph {
  storage {
    backend: cql
    hostname: ["172.25.0.10"]   # cyber-cassandra
    cql {
      cluster-name: cyber-homelab
      keyspace: thehive
    }
  }
  # ── Index — Elasticsearch 7.17 ──────────────────────────────────────────────
  index.search {
    backend: elasticsearch
    hostname: ["172.25.0.11"]   # cyber-elasticsearch
    index-name: thehive
  }
}

# ── File storage ─────────────────────────────────────────────────────────────
storage {
  provider: localfs
  localfs.location: /opt/thehive/files
}

# ── Cortex integration ───────────────────────────────────────────────────────
cortex {
  servers: [
    {
      name: "cortex-local"
      url: "http://172.25.0.21:9001"
      auth {
        type: "bearer"
        key: "pTbgaPQTs7BJFBtrEvOQVHH4dsFJKzwT"
      }
      wsConfig.ssl.loose.acceptAnyCertificate: true
    }
  ]
}

# ── MISP integration ─────────────────────────────────────────────────────────
misp {
  interval: 1 hour
  servers: [
    {
      name: "misp-local"
      url: "https://172.25.0.40"
      auth {
        type: "key"
        key: "h9ewN3sbZq3d3r0iUSWviEerNmtQSGtWOH6Ak1wI"
      }
      wsConfig.ssl.loose.acceptAnyCertificate: true
    }
  ]
}

# ── HTTP settings ─────────────────────────────────────────────────────────────
play.server.http.idleTimeout = 75s
play.http.parser.maxMemoryBuffer = 256M
