# =============================================================================
# TheHive 5 — Application Configuration
# Docs: https://docs.strangebee.com/thehive/installation/docker/
#
# THEHIVE_SECRET env var is injected by docker-compose from .env
# =============================================================================

# Play Framework secret key (must match THEHIVE_SECRET in .env)
play.http.secret.key = ${?THEHIVE_SECRET}

# ── Database — Cassandra 4 ───────────────────────────────────────────────────
db.janusgraph {
  storage {
    backend: cql
    hostname: ["172.25.0.10"]   # cyber-cassandra
    cql {
      cluster-name: cyber-homelab
      keyspace: thehive
    }
  }
  # ── Index — Elasticsearch 7.17 ──────────────────────────────────────────────
  index.search {
    backend: elasticsearch
    hostname: ["172.25.0.11"]   # cyber-elasticsearch
    index-name: thehive
  }
}

# ── File storage ─────────────────────────────────────────────────────────────
storage {
  provider: localfs
  localfs.location: /opt/thehive/files
}

