# =============================================================================
# Cortex 3 — Application Configuration
# Docs: https://github.com/TheHive-Project/CortexDocs
#
# CORTEX_SECRET env var is injected by docker-compose from .env
# =============================================================================

# Play Framework secret key (must match CORTEX_SECRET in .env)
play.http.secret.key = ${?CORTEX_SECRET}

# ── Elasticsearch 7.17 — data storage ────────────────────────────────────────
search {
  uri = "http://172.25.0.11:9200"   # cyber-elasticsearch
  keepAlive = "1m"
  pagesize = 50
  nbshards = 5
  nbreplicas = 1
  scrolltime = "1m"
  settings {
    number_of_shards = 5
    number_of_replicas = 1
  }
}

# ── Analyzers ────────────────────────────────────────────────────────────────
# Remote catalog (requires internet access from the container)
analyzer {
  urls = [
    "https://download.thehive-project.org/analyzers.json"
  ]
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 2.0
    parallelism-max = 4
  }
}

# ── Responders ───────────────────────────────────────────────────────────────
responder {
  urls = [
    "https://download.thehive-project.org/responders.json"
  ]
}

# ── Job execution ─────────────────────────────────────────────────────────────
# Cortex runs each analyzer as a sibling Docker container via the mounted socket.
# On Windows/Docker Desktop: works through the Docker Desktop Linux VM.
# On Linux: ensure the cortex user has access to the docker group.
job {
  directory = /tmp/cortex-jobs
  docker {
    # Pull updated analyzer images automatically
    autoUpdate = true
  }
}

# ── HTTP settings ─────────────────────────────────────────────────────────────
play.http.parser.maxDiskBuffer = 128m
play.http.parser.maxMemoryBuffer = 256k

# Cortex listens on port 9001 (mapped to host CORTEX_PORT in docker-compose)
http.port = 9001

# Configure Play CSRF filter to use the same cookie/header as elastic4play
# so that API calls with X-XSRF-TOKEN header pass both CSRF checks
play.filters.csrf.cookie.name = "CORTEX-XSRF-TOKEN"
play.filters.csrf.header.name = "X-XSRF-TOKEN"
play.filters.csrf.header.bypassHeaders {
  "X-Requested-With" = "*"
  "Csrf-Token" = "nocheck"
}
